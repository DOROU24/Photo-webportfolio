{% extends "base.html" %}

{% block title %}
    {{ name }}
{% endblock %}

{% block header %}
    <div style="align-items: center; ">
        <span>{{ name }}</span>

    </div>
{% endblock %}

{% block gallery %}
{% for i in n %}
    <div class="gallery-item">
        <img src='/{{ direct }}/photo{{i}}.jpg' alt="/" class="gallery-img" onclick="openModal({{ i }})">
        <button class="delete-btn" onclick="deleteImage(event,{{i}})">
            <i class="fas fa-trash delete-icon"></i>
        </button>
    </div>
{% endfor %}

<!-- Модальное окно -->
<div id="imageModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <img id="modalImage" src="" alt="">
        <div class="modal-buttons">
            <button class="modal-delete-btn" onclick="deleteCurrentImage()">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    </div>
</div>

<script>
let currentImageIndex = -1;
const images = document.querySelectorAll('.gallery-img');

function openModal(index) {
    currentImageIndex = index;
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    modal.style.display = "block";
    modalImg.src = images[index].src;
}

function closeModal() {
    const modal = document.getElementById('imageModal');
    modal.style.display = "none";
    currentImageIndex = -1;
}

function deleteImage(event, i) {
    event.stopPropagation();

    if (!confirm('Вы уверены, что хотите удалить это фото?')) {
        return;
    }

    const imageUrl = images[i].src;
    deleteImageByUrl(imageUrl, i);
}

function deleteCurrentImage() {
    if (currentImageIndex === -1) return;

    if (!confirm('Вы уверены, что хотите удалить это фото?')) {
        return;
    }

    const imageUrl = images[currentImageIndex].src;
    deleteImageByUrl(imageUrl, currentImageIndex);
    closeModal();
}

function deleteImageByUrl(imageUrl, index) {
    // Извлекаем имя файла из URL
    const fileName = imageUrl.split('/').pop();

    // Отправляем DELETE запрос на удаление
    fetch(window.location.href, {
        method: 'DELETE',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            filename: fileName
        })
    })
    .then(response => {
        if (response.ok) {
            // Удаляем элемент из DOM
            const galleryItem = images[index].closest('.gallery-item');
            galleryItem.remove();

            // Обновляем счетчики оставшихся изображений
            updateImageCounters();

            alert('Фото успешно удалено');
        } else {
            alert('Ошибка при удалении фото');
        }
    })
    .catch(error => {
        console.error('Ошибка:', error);
        alert('Произошла ошибка при удалении фото');
    });
}

function deleteAllImages() {
    if (!confirm('Вы уверены, что хотите удалить ВСЕ фото? Это действие нельзя отменить.')) {
        return;
    }

    // Показываем индикатор загрузки
    const deleteBtn = document.querySelector('.delete-all-btn');
    const originalText = deleteBtn.innerHTML;
    deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Удаление...';
    deleteBtn.disabled = true;

    // Отправляем DELETE запрос на удаление всех фото
    fetch(window.location.href, {
        method: 'DELETE',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            action: 'delete_all'
        })
    })
    .then(response => {
        if (response.ok) {
            // Удаляем все элементы галереи из DOM
            const galleryItems = document.querySelectorAll('.gallery-item');
            galleryItems.forEach(item => item.remove());

            alert('Все фото успешно удалены');
        } else {
            alert('Ошибка при удалении фото');
        }
    })
    .catch(error => {
        console.error('Ошибка:', error);
        alert('Произошла ошибка при удалении фото');
    })
    .finally(() => {
        // Восстанавливаем кнопку
        deleteBtn.innerHTML = '<i class="fas fa-trash"></i> Удалить все фото';
        deleteBtn.disabled = false;
    });
}

function updateImageCounters() {
    // Обновляем количество изображений (если нужно)
    const remainingImages = document.querySelectorAll('.gallery-item');
    console.log(`Осталось изображений: ${remainingImages.length}`);
}

// Закрытие модального окна при клике вне изображения
window.onclick = function(event) {
    const modal = document.getElementById('imageModal');
    if (event.target === modal) {
        closeModal();
    }
}
</script>

<style>
.delete-all-btn {
    background: linear-gradient(45deg, #f44336, #d32f2f);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(244, 67, 54, 0.3);
}

.delete-all-btn:hover {
    background: linear-gradient(45deg, #d32f2f, #f44336);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(244, 67, 54, 0.4);
}

.delete-all-btn:disabled {
    background: #cccccc;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

.delete-all-btn i {
    font-size: 18px;
}


.delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(244, 67, 54, 0.9);
    color: white;
    border: none;
    border-radius: 4px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    opacity: 1;
}

.delete-btn:hover {
    background: rgba(244, 67, 54, 1);
    transform: scale(1.1);
}

.delete-icon {
    font-size: 14px;
}

.modal-buttons {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
}

.modal-delete-btn {
    background: linear-gradient(45deg, #f44336, #d32f2f);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(244, 67, 54, 0.3);
}

.modal-delete-btn:hover {
    background: linear-gradient(45deg, #d32f2f, #f44336);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(244, 67, 54, 0.4);
}
</style>
{% endblock %}
